<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方活動募集網站</title>
    <style>
        :root {
            --primary-color: #1DA1F2; /* X 藍 */
            --accent-color: #ff4757;  /* 報名按鈕紅 */
            --bg-color: #f4f7f6;
        }
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            margin: 0; padding: 0; background-color: var(--bg-color); color: #333; line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white; padding: 60px 20px; text-align: center;
        }
        .container { max-width: 1000px; margin: -30px auto 50px; padding: 0 20px; }
        .card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; 
        }
        h2 { 
            border-left: 5px solid var(--primary-color); padding-left: 15px; 
            margin-bottom: 25px; color: #1a1a1a; 
        }

        /* PDF 容器 */
        .pdf-container {
            width: 100%; height: 600px; border: 1px solid #eee; border-radius: 8px;
        }

        /* 影片響應式 */
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* X 時間軸並排 */
        .social-grid {
            display: flex; gap: 20px; flex-wrap: wrap;
        }
        .social-item {
            flex: 1; min-width: 300px; height: 500px; 
            border: 1px solid #eee; border-radius: 10px; overflow-y: auto;
        }

        /* 表單區塊 */
        .form-container {
            width: 100%; min-height: 800px; border: none;
        }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.9em; }

        @media (max-width: 600px) {
            .pdf-container { height: 400px; }
            .social-item { min-width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 2026 官方活動人員募集</h1>
    <p>歡迎加入我們的行列，一起創造精彩活動！</p>
</header>

<div class="container">
    
    <div class="card">
        <h2>📋 活動詳細說明 (PDF)</h2>
        <p>您可以直接在網頁中翻閱簡章，或點擊下方連結下載。</p>
        <iframe src="activity_info.pdf" class="pdf-container"></iframe>
        <div style="text-align: center; margin-top: 15px;">
            <a href="activity_info.pdf" target="_blank" style="color: var(--primary-color);">📥 無法預覽？點此下載 PDF 檔案</a>
        </div>
    </div>

    <div class="card">
        <h2>🎥 官方宣傳影片</h2>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/你的影片ID" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="card">
        <h2>🐦 官方最新動態</h2>
        <div class="social-grid">
            <div class="social-item">
                <a class="twitter-timeline" href="https://twitter.com/X">Tweets by X</a>
            </div>
            <div class="social-item">
                <a class="twitter-timeline" href="https://twitter.com/XDevelopers">Tweets by XDevelopers</a>
            </div>
        </div>
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    </div>

    <div class="card" id="apply">
        <h2>📝 立即線上報名</h2>
        <iframe src="https://docs.google.com/forms/d/e/你的表單ID/viewform?embedded=true" class="form-container" frameborder="0" marginheight="0" marginwidth="0">載入中…</iframe>
    </div>

</div>

<footer>
    &copy; 2026 活動籌備委員會. All Rights Reserved.
</footer>

</body>
</html>
